{{- with .Params.featuredImage -}}
{{- if .url -}}
<figure class="featured-image" role="img" aria-label="{{ .alt | default $.Title }}">
  <img src="{{ .url }}" alt="{{ .alt | default $.Title }}" loading="lazy" decoding="async" width="900" height="506">
  {{- with .credit }}
  <figcaption>{{ . }}</figcaption>
  {{- end }}
</figure>
{{- end -}}
{{- end -}}
