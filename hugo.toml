baseURL = "https://blogcompany0.github.io/personal-finance-blog/"
languageCode = "en-US"
defaultContentLanguage = "en"
title = "WealthWise Journal"
theme = "PaperMod"
googleAnalytics = "G-63H6GS0341"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "Smart strategies for personal finance, investing, and building lasting wealth"
  author = "WealthWise Journal"
  googleAnalytics = ""
  locale = "en_US"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "WealthWise Journal"
    Content = "Smart strategies for personal finance, investing, and building lasting wealth."

  [params.profileMode]
    enabled = false

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[params.socialIcons]]
  name = "rss"
  url = "index.xml"

[markup]
  [markup.highlight]
    style = "dracula"
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40
